spring:
  application:
    name: client-app
  config:
    import: "configserver:http://localhost:8888"

server:
  port: 8080

app:
  name: Spring Cloud Config Client Application
  version: 1.0.0
  environment: development
  database:
    url: jdbc:postgresql://localhost:5432/myapp_db
    username: appuser
    password: password123
    max-pool-size: 10
  security:
    jwt-secret: my-super-secret-jwt-key-for-token-signing
    jwt-expiration: 86400000
    api-key: demo-api-key-12345

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
