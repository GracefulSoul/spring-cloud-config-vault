spring:
  application:
    name: client-app
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6
    vault:
      enabled: true
      host: localhost
      port: 8200
      scheme: http
      authentication: TOKEN
      token: s.xxxxxxxxxxxxxxxx
      generic:
        enabled: true
        backend: secret
        profile-separator: '/'
      kv:
        enabled: true
        backend: secret
        profile-separator: '/'
        version: 2
