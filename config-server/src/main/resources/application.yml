spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: file:${java.io.tmpdir}/spring-cloud-config-repo
          clone-on-start: true
          search-paths: '{application}'

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
