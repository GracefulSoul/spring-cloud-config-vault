# client-app-prod.yml
# 프로덕션 환경 설정

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

app:
  environment: production
  
  database:
    url: jdbc:postgresql://prod-db.example.com:5432/myapp_prod
    username: prod_user
    password: ${vault:secret/data/client-app/database/password}
    max-pool-size: 20

logging:
  level:
    root: WARN
    com.gracefulsoul: INFO
    org.springframework: WARN
